<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueerView — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080e;--surface:#0f0f1a;--card:#13131f;--border:#252535;--accent:#e879f9;--accent2:#fb7185;--accent3:#38bdf8;--text:#ededf5;--muted:#6b6b85;--green:#4ade80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem;}
.wrap{max-width:700px;margin:0 auto;}
h1{font-family:'Syne',sans-serif;font-size:1.5rem;margin-bottom:.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}

/* TABS */
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:.85rem;font-weight:600;padding:.65rem 1.25rem;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-badge{background:var(--accent2);color:white;font-size:.65rem;font-weight:700;padding:.1rem .4rem;border-radius:100px;margin-left:.4rem;}

.panel{display:none;}
.panel.active{display:block;}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;}
.card-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:1rem;}
label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;}
input,select,textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.7rem 1rem;border-radius:10px;outline:none;transition:border-color .2s;margin-bottom:1rem;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:90px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.row input,.row select{margin-bottom:0;}
.omdb-row{display:flex;gap:.75rem;margin-bottom:1rem;}
.omdb-row input{flex:1;margin-bottom:0;}
.btn-sm{background:var(--surface);border:1px solid var(--accent);color:var(--accent);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;padding:.7rem 1.1rem;border-radius:10px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.btn-sm:hover{background:rgba(232,121,249,.1);}
.btn-sm:disabled{opacity:.4;cursor:not-allowed;}
.preview{display:flex;gap:1rem;align-items:flex-start;padding:1rem;background:var(--surface);border-radius:10px;margin-bottom:1rem;}
.preview img{width:70px;border-radius:8px;aspect-ratio:2/3;object-fit:cover;flex-shrink:0;}
.preview-info .pt{font-weight:600;margin-bottom:.25rem;font-size:.92rem;}
.preview-info .pm{font-size:.74rem;color:var(--muted);}
.api-box{background:rgba(232,121,249,.05);border:1px solid rgba(232,121,249,.2);border-radius:12px;padding:1rem 1.25rem;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;}
.api-box p{font-size:.78rem;color:var(--muted);flex:1;min-width:140px;}
.api-box p strong{color:var(--text);}
.api-box input{flex:1;min-width:180px;margin-bottom:0;font-family:'DM Mono',monospace;font-size:.75rem;}
.api-save{background:var(--accent);border:none;color:white;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;padding:.5rem 1rem;border-radius:8px;cursor:pointer;}
.api-ok{font-size:.72rem;color:var(--green);display:none;}
.api-ok.show{display:block;}
.save-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;padding:1rem;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .1s;}
.save-btn:hover{opacity:.9;transform:translateY(-1px);}
.bulk-area{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;padding:.85rem 1rem;border-radius:10px;outline:none;resize:vertical;min-height:160px;margin-bottom:.75rem;}
.bulk-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:.85rem;font-weight:600;padding:.7rem 1.25rem;border-radius:10px;cursor:pointer;transition:all .2s;width:100%;}
.bulk-btn:hover{border-color:var(--accent);color:var(--accent);}
.log{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;font-family:'DM Mono',monospace;font-size:.73rem;max-height:260px;overflow-y:auto;margin-top:1rem;}
.ll{margin-bottom:.25rem;color:var(--muted);}
.ll.ok{color:var(--green);}
.ll.err{color:var(--accent2);}
.ll.info{color:var(--accent);}

/* ÖNERİLER */
.sug-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:.85rem;position:relative;}
.sug-card.done{opacity:.4;}
.sug-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.4rem;}
.sug-meta{font-size:.75rem;color:var(--muted);display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem;}
.sug-note{font-size:.8rem;color:var(--text);background:var(--surface);border-radius:8px;padding:.6rem .85rem;margin-bottom:.85rem;line-height:1.5;}
.sug-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
.sug-accept{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;padding:.45rem 1rem;border-radius:8px;cursor:pointer;transition:all .2s;}
.sug-accept:hover{background:rgba(74,222,128,.2);}
.sug-reject{background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.3);color:var(--accent2);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;padding:.45rem 1rem;border-radius:8px;cursor:pointer;transition:all .2s;}
.sug-reject:hover{background:rgba(251,113,133,.2);}
.sug-edit{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;padding:.45rem 1rem;border-radius:8px;cursor:pointer;transition:all .2s;}
.sug-edit:hover{border-color:var(--accent);color:var(--accent);}
.tag{font-size:.63rem;font-weight:600;letter-spacing:.05em;padding:.2rem .5rem;border-radius:4px;text-transform:uppercase;}
.tl{background:rgba(232,121,249,.15);color:var(--accent);}
.tg{background:rgba(56,189,248,.15);color:var(--accent3);}
.tt{background:rgba(251,191,36,.15);color:#fbbf24;}
.tb{background:rgba(251,113,133,.15);color:var(--accent2);}
.tq{background:rgba(167,139,250,.15);color:#a78bfa;}
.empty-sug{text-align:center;padding:3rem 2rem;color:var(--muted);font-size:.88rem;}
.reload-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:.75rem;font-family:'Syne',sans-serif;padding:.35rem .85rem;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:1rem;}
.reload-btn:hover{border-color:var(--accent);color:var(--accent);}
select option{background:#1a1a2e;}

/* PLATFORM ATAMA */
.info-box{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.15);border-radius:10px;padding:.85rem 1rem;font-size:.75rem;color:#93c5fd;margin-bottom:1rem;line-height:1.6;}
.info-box strong{color:var(--accent3);}
.plat-preview{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem;min-height:24px;}
.pb{font-size:.68rem;font-weight:600;padding:.2rem .55rem;border-radius:6px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:var(--accent3);}
</style>
</head>
<body>
<div class="wrap">
  <h1>QueerView — Admin</h1>
  <p class="sub">Film ekle · Önerileri onayla · Türkçe açıklama</p>

  <!-- API KEY -->
  <div class="api-box">
    <p><strong>Anthropic API Key</strong></p>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <button class="api-save" onclick="saveKey()">Kaydet</button>
    <span class="api-ok" id="apiOk">✓ Aktif</span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">Film Ekle</button>
    <button class="tab" onclick="switchTab('bulk')">Toplu Ekle</button>
    <button class="tab" id="sugTab" onclick="switchTab('suggestions')">Öneriler <span class="tab-badge" id="sugBadge" style="display:none">0</span></button>
  </div>

  <!-- FİLM EKLE -->
  <div class="panel active" id="panel-add">
    <div class="card">
      <div class="card-title" style="color:var(--accent)">✦ Film / Dizi Ekle</div>

      <label>Film / Dizi Adı</label>
      <div class="omdb-row">
        <input id="omdbTitle" type="text" placeholder="örn: I Told Sunset About You">
        <button class="btn-sm" onclick="fetchOMDB()">Çek ↓</button>
      </div>
      <div id="preview" style="display:none"></div>

      <div class="row">
        <div><label>Başlık</label><input id="title" type="text"></div>
        <div><label>Orijinal Başlık</label><input id="origTitle" type="text"></div>
      </div>
      <div class="row">
        <div><label>Yıl</label><input id="year" type="text" placeholder="2021"></div>
        <div><label>Tür</label>
          <select id="type"><option value="dizi">Dizi</option><option value="film">Film</option><option value="belgesel">Belgesel</option></select>
        </div>
      </div>
      <div class="row">
        <div><label>Queer Kategori</label>
          <select id="category" onchange="updatePlatPreview()">
            <option value="lezbiyen">🌸 Lezbiyen / GL</option>
            <option value="gay">💙 Gay / BL</option>
            <option value="trans">🌼 Trans</option>
            <option value="biseksüel">💜 Biseksüel</option>
            <option value="queer">🌈 Queer</option>
          </select>
        </div>
        <div><label>Ülke</label><input id="country" type="text" placeholder="Tayland, Tayvan..." oninput="updatePlatPreview()"></div>
      </div>
      <div style="margin-bottom:1rem">
        <label>Poster URL</label>
        <input id="poster" type="text" placeholder="https://...">
      </div>
      <div style="margin-bottom:1rem">
        <label>Türkçe Açıklama
          <button class="btn-sm" id="translateBtn" onclick="translateDesc()" style="margin-left:.5rem;padding:.25rem .7rem;font-size:.7rem">✨ Çevir</button>
        </label>
        <textarea id="desc" placeholder="OMDB'den çekince otomatik çevrilir..."></textarea>
      </div>
      <div style="margin-bottom:1rem">
        <label>Atanacak Platformlar</label>
        <div class="plat-preview" id="platPreview"></div>
      </div>
      <button class="save-btn" onclick="saveMovie()">💾 Kaydet & Yayınla</button>
    </div>
    <div class="log" id="log1"><div class="ll">— hazır...</div></div>
  </div>

  <!-- TOPLU EKLE -->
  <div class="panel" id="panel-bulk">
    <div class="card">
      <div class="card-title" style="color:var(--accent2)">⚡ Toplu Ekle</div>
      <p style="font-size:.78rem;color:var(--muted);margin-bottom:.85rem">Her satıra bir film — OMDB'den çeker, Claude Türkçe'ye çevirir, ülkeye göre platform atar.</p>
      <textarea class="bulk-area" id="bulkList" placeholder="I Told Sunset About You&#10;2gether The Series&#10;A Tale of Thousand Stars&#10;Never Let Me Go&#10;The Eclipse"></textarea>
      <div class="row">
        <div><label>Kategori</label>
          <select id="bulkCat">
            <option value="gay">💙 Gay / BL</option>
            <option value="lezbiyen">🌸 Lezbiyen / GL</option>
            <option value="queer">🌈 Queer</option>
            <option value="trans">🌼 Trans</option>
            <option value="biseksüel">💜 Biseksüel</option>
          </select>
        </div>
        <div><label>Varsayılan Ülke (opsiyonel)</label><input id="bulkCountry" type="text" placeholder="Boş = OMDB'den" style="margin-bottom:0"></div>
      </div>
      <button class="bulk-btn" onclick="bulkAdd()">⚡ Hepsini Ekle</button>
    </div>
    <div class="log" id="log2"><div class="ll">— hazır...</div></div>
  </div>

  <!-- ÖNERİLER -->
  <div class="panel" id="panel-suggestions">
    <button class="reload-btn" onclick="loadSuggestions()">↻ Yenile</button>
    <div id="sugList"><div class="empty-sug">Yükleniyor...</div></div>
  </div>
</div>

<script>
const SB='https://hvctuvptiwjrtlcspqsb.supabase.co';
const SK='sb_publishable_P5MNhMqfCqdg5yFXTEQLbQ_CS1MLVgJ';
const OMDB='59128d09';
let anthropicKey=localStorage.getItem('qv_admin_key')||'';

window.onload=()=>{
  if(anthropicKey){document.getElementById('apiKey').value=anthropicKey;document.getElementById('apiOk').classList.add('show');}
  updatePlatPreview();
  loadSuggestionCount();
};

function saveKey(){
  anthropicKey=document.getElementById('apiKey').value.trim();
  if(!anthropicKey)return;
  localStorage.setItem('qv_admin_key',anthropicKey);
  document.getElementById('apiOk').classList.add('show');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','bulk','suggestions'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  if(tab==='suggestions')loadSuggestions();
}

function log(id,msg,type=''){
  const d=document.getElementById(id);
  const l=document.createElement('div');l.className='ll '+(type||'');l.textContent=msg;
  d.appendChild(l);d.scrollTop=d.scrollHeight;
}

// PLATFORM ATAMA
function guessPlatforms(country){
  const c=(country||'').toLowerCase();
  if(c.includes('tayland')||c.includes('thailand'))return['WebDramaTurkey','GagaOOLala'];
  if(c.includes('tayvan')||c.includes('taiwan'))return['GagaOOLala','Viki'];
  if(c.includes('kore')||c.includes('korea'))return['Viki','Netflix'];
  if(c.includes('japon')||c.includes('japan'))return['GagaOOLala','Viki'];
  if(c.includes('çin')||c.includes('china'))return['GagaOOLala'];
  if(c.includes('avrupa')||c.includes('france')||c.includes('germany')||c.includes('uk'))return['Mubi'];
  if(c.includes('abd')||c.includes('usa')||c.includes('united states'))return['Netflix','Prime'];
  return['Diğer'];
}

function updatePlatPreview(){
  const country=document.getElementById('country')?.value||'';
  const plats=guessPlatforms(country);
  const prev=document.getElementById('platPreview');
  if(prev)prev.innerHTML=plats.map(p=>`<span class="pb">${p}</span>`).join('');
}

// OMDB
async function fetchOMDB(titleOverride,logId='log1'){
  const title=titleOverride||document.getElementById('omdbTitle').value.trim();
  if(!title){log(logId,'⚠ Film adı gir','err');return null;}
  log(logId,`🔍 "${title}" aranıyor...`);
  try{
    const r=await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB}`);
    const d=await r.json();
    if(d.Response==='False'){log(logId,`✗ Bulunamadı: ${title}`,'err');return null;}
    if(!titleOverride){
      document.getElementById('title').value=d.Title||'';
      document.getElementById('origTitle').value=d.Title||'';
      document.getElementById('year').value=(d.Year||'').slice(0,4);
      document.getElementById('poster').value=d.Poster&&d.Poster!=='N/A'?d.Poster:'';
      document.getElementById('desc').value=d.Plot&&d.Plot!=='N/A'?d.Plot:'';
      document.getElementById('country').value=d.Country||'';
      if(d.Type==='series')document.getElementById('type').value='dizi';
      else document.getElementById('type').value='film';
      updatePlatPreview();
      const prev=document.getElementById('preview');
      prev.style.display='block';
      prev.innerHTML=`<div class="preview">${d.Poster&&d.Poster!=='N/A'?`<img src="${d.Poster}">`:''}
        <div class="preview-info"><div class="pt">${d.Title}</div>
        <div class="pm">${d.Year} · ${d.Country||''} · ${d.Genre||''}</div></div></div>`;
      log(logId,`✓ "${d.Title}" bulundu`,'ok');
      if(anthropicKey&&d.Plot&&d.Plot!=='N/A')translateDesc();
    }
    return d;
  }catch(e){log(logId,'✗ OMDB hatası: '+e.message,'err');return null;}
}

// CLAUDE ÇEVİRİ
async function translateDesc(){
  const desc=document.getElementById('desc').value.trim();
  const title=document.getElementById('title').value.trim();
  if(!desc||!anthropicKey)return;
  log('log1','✨ Türkçe\'ye çevriliyor...');
  document.getElementById('translateBtn').disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:`"${title}" filminin şu İngilizce açıklamasını akıcı, doğal Türkçe'ye çevir. Sadece çeviriyi yaz:\n\n${desc}`}]})
    });
    const data=await r.json();
    const text=data.content?.map(c=>c.text||'').join('');
    if(text){document.getElementById('desc').value=text;log('log1','✓ Türkçe açıklama hazır','ok');}
  }catch(e){log('log1','✗ Çeviri hatası','err');}
  document.getElementById('translateBtn').disabled=false;
}

async function claudeTranslate(text,title){
  if(!anthropicKey||!text)return text;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:`"${title}" filminin şu İngilizce açıklamasını akıcı, doğal Türkçe'ye çevir. Sadece çeviriyi yaz:\n\n${text}`}]})
    });
    const data=await r.json();
    return data.content?.map(c=>c.text||'').join('')||text;
  }catch(e){return text;}
}

// KAYDET
async function saveMovie(movieData,logId='log1'){
  const country=movieData?.country||document.getElementById('country').value.trim();
  const platforms=guessPlatforms(country);
  const movie=movieData||{
    title:document.getElementById('title').value.trim(),
    original_title:document.getElementById('origTitle').value.trim(),
    year:document.getElementById('year').value.trim(),
    type:document.getElementById('type').value,
    category:document.getElementById('category').value,
    country,
    poster:document.getElementById('poster').value.trim()||null,
    description:document.getElementById('desc').value.trim(),
    platforms,
    genre:[]
  };
  if(!movie.title){log(logId,'⚠ Başlık boş!','err');return false;}
  try{
    const r=await fetch(`${SB}/rest/v1/movies`,{
      method:'POST',
      headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(movie)
    });
    if(r.ok||r.status===201){
      log(logId,`✓ "${movie.title}" eklendi!`,'ok');
      if(!movieData){
        ['title','origTitle','year','country','poster','desc','omdbTitle'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
        document.getElementById('preview').style.display='none';
        updatePlatPreview();
      }
      return true;
    }else{const e=await r.text();log(logId,`✗ ${movie.title}: ${e}`,'err');return false;}
  }catch(e){log(logId,'✗ '+e.message,'err');return false;}
}

// TOPLU
async function bulkAdd(){
  const lines=document.getElementById('bulkList').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const cat=document.getElementById('bulkCat').value;
  const forceCountry=document.getElementById('bulkCountry').value.trim();
  if(!lines.length){log('log2','⚠ Liste boş','err');return;}
  log('log2',`⚡ ${lines.length} içerik ekleniyor...`,'info');
  for(const title of lines){
    const d=await fetchOMDB(title,'log2');
    if(d){
      const country=forceCountry||d.Country||'';
      let desc=d.Plot&&d.Plot!=='N/A'?d.Plot:'';
      if(desc){
        log('log2',`  🌐 "${d.Title}" çevriliyor...`);
        desc=await claudeTranslate(desc,d.Title);
      }
      await saveMovie({
        title:d.Title,original_title:d.Title,
        year:(d.Year||'').slice(0,4),
        type:d.Type==='series'?'dizi':'film',
        category:cat,country,
        poster:d.Poster&&d.Poster!=='N/A'?d.Poster:null,
        description:desc,
        platforms:guessPlatforms(country),
        genre:d.Genre?d.Genre.split(', '):[]
      },'log2');
    }
    await new Promise(res=>setTimeout(res,1200));
  }
  log('log2','✅ Tamamlandı!','ok');
}

// ÖNERİLER
async function loadSuggestionCount(){
  try{
    const r=await fetch(`${SB}/rest/v1/suggestions?select=id&status=is.null`,{headers:{'apikey':SK,'Authorization':`Bearer ${SK}`}});
    const data=await r.json();
    const badge=document.getElementById('sugBadge');
    if(data.length>0){badge.style.display='inline';badge.textContent=data.length;}
    else badge.style.display='none';
  }catch(e){}
}

async function loadSuggestions(){
  const list=document.getElementById('sugList');
  list.innerHTML='<div class="empty-sug">Yükleniyor...</div>';
  try{
    const r=await fetch(`${SB}/rest/v1/suggestions?select=*&order=created_at.desc`,{headers:{'apikey':SK,'Authorization':`Bearer ${SK}`}});
    const data=await r.json();
    if(!data.length){list.innerHTML='<div class="empty-sug">Henüz öneri yok 🌈</div>';return;}
    list.innerHTML=data.map(s=>`
      <div class="sug-card ${s.status?'done':''}" id="sug-${s.id}">
        <div class="sug-title">${s.title||'—'}</div>
        <div class="sug-meta">
          <span class="tag ${tc_(s.category)}">${tl_(s.category)}</span>
          ${s.country?`<span>📍 ${s.country}</span>`:''}
          ${s.platform_url?`<span>▶ ${s.platform_url}</span>`:''}
          <span style="margin-left:auto">${formatDate(s.created_at)}</span>
          ${s.status?`<span style="color:var(--green)">✓ ${s.status}</span>`:''}
        </div>
        ${s.note?`<div class="sug-note">${escHtml(s.note)}</div>`:''}
        ${!s.status?`<div class="sug-actions">
          <button class="sug-accept" onclick="acceptSuggestion('${s.id}','${escAttr(s.title)}','${escAttr(s.category)}','${escAttr(s.country||'')}')">✓ Ekle</button>
          <button class="sug-reject" onclick="rejectSuggestion('${s.id}')">✕ Reddet</button>
        </div>`:''}
      </div>`).join('');
  }catch(e){list.innerHTML='<div class="empty-sug">Yüklenemedi.</div>';}
}

async function acceptSuggestion(id,title,category,country){
  log('log1',`🔍 "${title}" OMDB'den çekiliyor...`,'info');
  switchTab('add');
  document.getElementById('omdbTitle').value=title;
  document.getElementById('category').value=category||'queer';
  await fetchOMDB();
  if(country)document.getElementById('country').value=country;
  updatePlatPreview();
  // öneriyi işaretlere
  await fetch(`${SB}/rest/v1/suggestions?id=eq.${id}`,{
    method:'PATCH',
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'},
    body:JSON.stringify({status:'eklendi'})
  });
}

async function rejectSuggestion(id){
  await fetch(`${SB}/rest/v1/suggestions?id=eq.${id}`,{
    method:'PATCH',
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'},
    body:JSON.stringify({status:'reddedildi'})
  });
  document.getElementById(`sug-${id}`).classList.add('done');
  loadSuggestionCount();
}

function tc_(c){return{lezbiyen:'tl',gay:'tg',trans:'tt','biseksüel':'tb',queer:'tq'}[c]||'tq';}
function tl_(c){return{lezbiyen:'Lezbiyen',gay:'Gay · BL',trans:'Trans','biseksüel':'Biseksüel',queer:'Queer'}[c]||c||'';}
function formatDate(d){return new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}
function escHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function escAttr(t){return(t||'').replace(/'/g,"\\'");}
</script>

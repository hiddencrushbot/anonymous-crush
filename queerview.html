<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueerView</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080e;--surface:#0f0f1a;--card:#13131f;--border:#252535;--accent:#e879f9;--accent2:#fb7185;--accent3:#38bdf8;--text:#ededf5;--muted:#6b6b85;--dim:#3a3a50;--gold:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(232,121,249,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(251,113,133,.05) 0%,transparent 60%);z-index:0;}

header{position:sticky;top:0;z-index:100;background:rgba(8,8,14,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;}
.hi{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:64px;}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.logo span{font-style:italic;font-weight:400;}
.cats{display:flex;gap:.25rem;flex:1;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{background:none;border:1px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;padding:.35rem .85rem;border-radius:100px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.cat-btn:hover{color:var(--text);border-color:var(--dim);}
.cat-btn.active{background:rgba(232,121,249,.12);border-color:var(--accent);color:var(--accent);}

.hero{position:relative;z-index:1;padding:3rem 2rem 1.5rem;text-align:center;max-width:700px;margin:0 auto;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:400;line-height:1.2;margin-bottom:.5rem;}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem;}
.sw{display:flex;gap:.75rem;}
.si{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;padding:.85rem 1.25rem;border-radius:12px;outline:none;transition:border-color .2s,box-shadow .2s;}
.si::placeholder{color:var(--muted);}
.si:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,121,249,.1);}
.sb{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:600;padding:.85rem 1.5rem;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .1s;}
.sb:hover{opacity:.9;transform:translateY(-1px);}

.main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:1.5rem 2rem 4rem;}
.fr{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
.fl{font-size:.75rem;color:var(--muted);}
.fc{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:.75rem;font-family:'DM Sans',sans-serif;padding:.3rem .75rem;border-radius:100px;cursor:pointer;transition:all .2s;}
.fc:hover{color:var(--text);border-color:var(--dim);}
.fc.active{background:rgba(56,189,248,.1);border-color:var(--accent3);color:var(--accent3);}
.sep{width:1px;height:18px;background:var(--border);}
.sl{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeUp .35s ease both;}
.card:hover{transform:translateY(-4px);border-color:var(--dim);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.cp{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface);}
.cpp{width:100%;aspect-ratio:2/3;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:3rem;}
.cb{padding:.85rem;}
.ct{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;line-height:1.3;margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cm{font-size:.72rem;color:var(--muted);display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.45rem;}
.tag{font-size:.63rem;font-weight:600;letter-spacing:.05em;padding:.2rem .5rem;border-radius:4px;text-transform:uppercase;}
.tl{background:rgba(232,121,249,.15);color:var(--accent);}
.tg{background:rgba(56,189,248,.15);color:var(--accent3);}
.tt{background:rgba(251,191,36,.15);color:var(--gold);}
.tb{background:rgba(251,113,133,.15);color:var(--accent2);}
.tq{background:rgba(167,139,250,.15);color:#a78bfa;}
.sub-badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.62rem;font-weight:600;padding:.18rem .45rem;border-radius:4px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:var(--accent3);margin-top:.4rem;}
.cd{font-size:.73rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:.35rem;}

.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{text-align:center;color:var(--muted);font-size:.85rem;}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);}
.ei{font-size:3rem;margin-bottom:1rem;opacity:.5;}
.empty h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--text);margin-bottom:.5rem;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s;}
.ov.open .modal{transform:translateY(0);}
.mh{display:flex;gap:1.5rem;padding:1.5rem;border-bottom:1px solid var(--border);}
.mi{width:120px;flex-shrink:0;border-radius:10px;overflow:hidden;}
.mi img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.miph{width:100%;aspect-ratio:2/3;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:2.5rem;border-radius:10px;}
.minfo{flex:1;}
.mtitle{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;line-height:1.2;margin-bottom:.5rem;}
.mmeta{font-size:.8rem;color:var(--muted);margin-bottom:.75rem;}
.mb{padding:1.5rem;}
.mdesc{font-size:.88rem;line-height:1.7;color:var(--muted);margin-bottom:1.25rem;}
.mpt{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem;}
.mpl{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.pl{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.78rem;font-weight:500;padding:.45rem 1rem;border-radius:8px;text-decoration:none;transition:all .2s;cursor:default;}
.sub-btn{display:inline-flex;align-items:center;gap:.5rem;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3);color:var(--accent3);font-size:.85rem;font-weight:600;font-family:'Syne',sans-serif;padding:.65rem 1.25rem;border-radius:10px;text-decoration:none;transition:all .2s;}
.sub-btn:hover{background:rgba(56,189,248,.15);border-color:var(--accent3);}
.mc{position:absolute;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.mc:hover{color:var(--text);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){
  .cats{display:none;}
  .hero{padding:2rem 1rem 1.5rem;}
  .main{padding:1rem 1rem 3rem;}
  .grid{grid-template-columns:repeat(2,1fr);gap:.85rem;}
  .mh{flex-direction:column;}
  .mi{width:100%;}
}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">Queer<span>View</span></div>
    <div class="cats">
      <button class="cat-btn active" data-cat="">Tümü</button>
      <button class="cat-btn" data-cat="lezbiyen">🌸 Lezbiyen</button>
      <button class="cat-btn" data-cat="gay">💙 Gay · BL</button>
      <button class="cat-btn" data-cat="trans">🌼 Trans</button>
      <button class="cat-btn" data-cat="biseksüel">💜 Biseksüel</button>
      <button class="cat-btn" data-cat="queer">🌈 Queer</button>
    </div>
  </div>
</header>

<div class="hero">
  <h1>Queer film & dizi,<br><em>hepsini bul.</em></h1>
  <p>Türkçe altyazılı queer içerik veritabanı</p>
  <div class="sw">
    <input class="si" id="si" type="text" placeholder="Film veya dizi ara..." autocomplete="off">
    <button class="sb" onclick="doSearch()">Ara</button>
  </div>
</div>

<div class="main">
  <div class="fr">
    <span class="fl">Tür:</span>
    <button class="fc active" data-type="">Tümü</button>
    <button class="fc" data-type="dizi">Dizi</button>
    <button class="fc" data-type="film">Film</button>
    <button class="fc" data-type="belgesel">Belgesel</button>
    <div class="sep"></div>
    <button class="fc" data-sub="1">🇹🇷 Altyazılı</button>
    <div class="sep"></div>
    <button class="fc" data-country="Tayland">Tayland</button>
    <button class="fc" data-country="Tayvan">Tayvan</button>
    <button class="fc" data-country="Kore">Kore</button>
    <button class="fc" data-country="Japonya">Japonya</button>
    <button class="fc" data-country="Avrupa">Avrupa</button>
    <button class="fc" data-country="ABD">ABD</button>
  </div>

  <div id="loading"><div class="spinner"></div><div class="lt">Yükleniyor...</div></div>
  <div id="empty" style="display:none"><div class="empty"><div class="ei">🎬</div><h3>Henüz içerik yok</h3><p>Yakında eklenecek!</p></div></div>
  <div id="rs" style="display:none">
    <div class="sl" id="rl">İçerikler</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="clo(event)">
  <div class="modal">
    <button class="mc" onclick="cm()">✕</button>
    <div class="mh">
      <div class="mi" id="mI"></div>
      <div class="minfo">
        <div class="mtitle" id="mT"></div>
        <div class="mmeta" id="mM"></div>
        <div id="mTg" style="margin-bottom:.5rem"></div>
        <div id="mSub"></div>
      </div>
    </div>
    <div class="mb">
      <div class="mdesc" id="mD"></div>
      <div id="mPS" style="display:none">
        <div class="mpt">Nerede izlenir</div>
        <div class="mpl" id="mPl"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SB='https://hvctuvptiwjrtlcspqsb.supabase.co',KEY='sb_publishable_P5MNhMqfCqdg5yFXTEQLbQ_CS1MLVgJ';
let all=[],aC='',aT='',aCo='',aSub=false,sQ='';

async function load(){
  try{
    const r=await fetch(`${SB}/rest/v1/movies?select=*&order=created_at.desc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
    if(!r.ok)throw new Error();
    all=await r.json();render();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('empty').style.display='block';
  }
}

function render(){
  document.getElementById('loading').style.display='none';
  let list=all.filter(m=>{
    if(aC&&m.category!==aC)return false;
    if(aT&&m.type!==aT)return false;
    if(aCo&&!(m.country||'').toLowerCase().includes(aCo.toLowerCase()))return false;
    if(aSub&&!m.subtitle_url)return false;
    if(sQ){const q=sQ.toLowerCase();if(!(m.title||'').toLowerCase().includes(q)&&!(m.description||'').toLowerCase().includes(q)&&!(m.original_title||'').toLowerCase().includes(q))return false;}
    return true;
  });
  if(!list.length){document.getElementById('rs').style.display='none';document.getElementById('empty').style.display='block';return;}
  document.getElementById('empty').style.display='none';document.getElementById('rs').style.display='block';
  document.getElementById('rl').textContent=`${list.length} içerik`;
  const g=document.getElementById('grid');g.innerHTML='';
  list.forEach((m,i)=>{
    const d=document.createElement('div');d.className='card';d.style.animationDelay=`${i*.04}s`;d.onclick=()=>om(m);
    const pl=Array.isArray(m.platforms)?m.platforms:[];
    d.innerHTML=`
      ${m.poster?`<img class="cp" src="${m.poster}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="cpp" style="${m.poster?'display:none':''}">${ej(m.category)}</div>
      <div class="cb">
        <div class="ct">${m.title||''}</div>
        <div class="cm">
          ${m.year?`<span>${m.year}</span><span>·</span>`:''}
          ${m.country?`<span>${m.country}</span><span>·</span>`:''}
          ${m.type?`<span>${m.type}</span>`:''}
        </div>
        <span class="tag ${tc_(m.category)}">${tl_(m.category)}</span>
        ${m.subtitle_url?`<span class="sub-badge">🇹🇷 TR Altyazı</span>`:''}
        <div class="cd">${m.description||''}</div>
      </div>`;
    g.appendChild(d);
  });
}

function om(m){
  document.getElementById('mI').innerHTML=m.poster
    ?`<img src="${m.poster}" onerror="this.parentElement.innerHTML='<div class=miph>${ej(m.category)}</div>'">`
    :`<div class="miph">${ej(m.category)}</div>`;
  document.getElementById('mT').textContent=m.title||'';
  const meta=[];
  if(m.original_title&&m.original_title!==m.title)meta.push(m.original_title);
  if(m.year)meta.push(m.year);if(m.country)meta.push(m.country);if(m.type)meta.push(m.type);
  document.getElementById('mM').textContent=meta.join(' · ');
  document.getElementById('mTg').innerHTML=`<span class="tag ${tc_(m.category)}">${tl_(m.category)}</span>`;
  document.getElementById('mSub').innerHTML=m.subtitle_url
    ?`<a class="sub-btn" href="${m.subtitle_url}" target="_blank">🇹🇷 Türkçe Altyazı İndir</a>`:'';
  document.getElementById('mD').textContent=m.description||'';
  const pl=Array.isArray(m.platforms)?m.platforms:[];
  const ps=document.getElementById('mPS');
  if(pl.length){ps.style.display='block';document.getElementById('mPl').innerHTML=pl.map(p=>`<span class="pl">${p}</span>`).join('');}
  else ps.style.display='none';
  document.getElementById('ov').classList.add('open');document.body.style.overflow='hidden';
}

function cm(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function clo(e){if(e.target===document.getElementById('ov'))cm();}
function doSearch(){sQ=document.getElementById('si').value.trim();render();}
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');aC=b.dataset.cat;render();
}));
document.querySelectorAll('.fc[data-type]').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.fc[data-type]').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');aT=c.dataset.type;render();
}));
document.querySelectorAll('.fc[data-country]').forEach(c=>c.addEventListener('click',()=>{
  if(c.classList.contains('active')){c.classList.remove('active');aCo='';}
  else{document.querySelectorAll('.fc[data-country]').forEach(x=>x.classList.remove('active'));c.classList.add('active');aCo=c.dataset.country;}
  render();
}));
document.querySelectorAll('.fc[data-sub]').forEach(c=>c.addEventListener('click',()=>{
  aSub=!c.classList.contains('active');
  c.classList.toggle('active');render();
}));

function tc_(c){return{lezbiyen:'tl',gay:'tg',trans:'tt','biseksüel':'tb',queer:'tq'}[c]||'tq';}
function tl_(c){return{lezbiyen:'Lezbiyen',gay:'Gay · BL',trans:'Trans','biseksüel':'Biseksüel',queer:'Queer'}[c]||c||'';}
function ej(c){return{lezbiyen:'🌸',gay:'💙',trans:'🌼','biseksüel':'💜',queer:'🌈'}[c]||'🎬';}

load();
</script>
</body>
</html>
